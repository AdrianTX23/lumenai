name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with .fvmrc
  FLUTTER_VERSION: "3.27.4"

jobs:
  quality:
    name: Analyze · Format · Boundaries · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Architecture boundaries
        run: bash tools/check_boundaries.sh

      - name: Format check
        run: dart run melos run format

      - name: Analyze (zero-warning policy)
        run: dart run melos run analyze

      - name: Tests
        run: dart run melos run test

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build APK (dev flavor entrypoint)
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --debug --target lib/main_dev.dart

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build iOS (dev flavor entrypoint)
        working-directory: app
        run: |
          flutter pub get
          flutter build ios --debug --no-codesign --target lib/main_dev.dart
