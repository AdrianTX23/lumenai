name: Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "packages/**"
      - "widgetbook/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Keep in sync with .fvmrc
  FLUTTER_VERSION: "3.27.4"

jobs:
  build-and-deploy:
    name: Build app + Widgetbook → GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The real app, seeded demo data, at the site root — the primary
      # portfolio artifact (docs/07-roadmap.md, Phase 7 exit criteria).
      - name: Build app (web)
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release -t lib/main_web.dart --base-href /${{ github.event.repository.name }}/

      # The design-system catalog, at a subpath — living documentation
      # of core_ui in isolation.
      - name: Build Widgetbook
        working-directory: widgetbook
        run: |
          flutter pub get
          flutter build web --release --base-href /${{ github.event.repository.name }}/widgetbook/

      - name: Assemble combined Pages artifact
        run: |
          mkdir -p deploy
          cp -R app/build/web/. deploy/
          mkdir -p deploy/widgetbook
          cp -R widgetbook/build/web/. deploy/widgetbook/
          touch deploy/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - id: deployment
        uses: actions/deploy-pages@v4
