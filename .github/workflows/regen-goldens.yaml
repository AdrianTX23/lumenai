name: Regen Goldens (one-off)

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.27.4"

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Bootstrap
        run: |
          dart pub get
          dart run melos bootstrap
      - name: Update CI goldens
        working-directory: packages/core_ui
        run: flutter test --update-goldens test/goldens/
      - uses: actions/upload-artifact@v4
        with:
          name: ci-goldens
          path: packages/core_ui/test/goldens/goldens/ci/
