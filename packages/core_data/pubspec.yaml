name: core_data
description: >-
  LUMEN AI infrastructure layer: Drift database, repository implementations
  (adapters), DTOs/mappers, seed engine and remote clients. Implements the
  ports defined in core_domain. Nothing depends on this package except the
  app's composition root.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  core_domain:
    path: ../core_domain
  core_telemetry:
    path: ../core_telemetry
  drift: ^2.20.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  local_auth: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.5.3
  sqlcipher_flutter_libs: ^0.6.4

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.20.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
